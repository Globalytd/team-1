name: Update CODEOWNERS from contributors

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # weekly
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-codeowners:
    runs-on: ubuntu-latest
    steps:
      - name: Update CODEOWNERS with repo contributors
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get repository collaborators (users who have explicit access to this repo)
            // We fetch the first 100; in large repos you may want to handle pagination.
            const collabs = await github.rest.repos.listCollaborators({ owner, repo, per_page: 100 });

            // Keep only human users with a login and sufficient permissions to push/maintain/admin
            const users = collabs.data
              .filter(u => u && u.type === 'User' && u.login && u.permissions && (
                u.permissions.push || u.permissions.admin || u.permissions.maintain
              ))
              .map(u => u.login);

            if (users.length === 0) {
              core.info('No contributors found, skipping.');
              return;
            }

            // Build CODEOWNERS content: all contributors become owners for all paths
            const header = '# Auto-generated CODEOWNERS — do not edit directly\n# Generated by .github/workflows/update-codeowners.yml\n\n';
            const line = '* ' + users.map(u => '@' + u).join(' ');
            const content = header + line + '\n';

            const path = '.github/CODEOWNERS';

            // Check if file already exists and is identical
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path });
              if (existing && existing.data && existing.data.sha) {
                const existingContent = Buffer.from(existing.data.content, existing.data.encoding).toString();
                if (existingContent === content) {
                  core.info('CODEOWNERS already up to date.');
                  return;
                }
                sha = existing.data.sha;
              }
            } catch (err) {
              // file may not exist — we'll create it
            }

            const params = {
              owner,
              repo,
              path,
              message: 'chore: update CODEOWNERS from collaborators [skip ci]',
              content: Buffer.from(content).toString('base64'),
              committer: { name: 'github-actions[bot]', email: '41898282+github-actions[bot]@users.noreply.github.com' }
            };
            if (sha) params.sha = sha;

            await github.rest.repos.createOrUpdateFileContents(params);
          github-token: ${{ secrets.GITHUB_TOKEN }}

